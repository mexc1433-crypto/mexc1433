<title>FOREX PALESTINE — The Future of Alpha</title>
<style>
:root{
  --bg:#05070A; --surface:#0F1218; --green:#00FFA3; --cyan:#00E0FF; --silver:#E2E8F0;
  --heading:'Space Grotesk',ui-sans-serif,system-ui,sans-serif;
  --body:'Inter',ui-sans-serif,system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--bg);color:var(--silver);line-height:1.6;overflow-x:hidden;font-size:16px}
@media(min-width:768px){body{font-size:18px}}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
:focus-visible{outline:2px solid var(--green);outline-offset:2px;border-radius:4px}

/* Glass */
.glass{background:rgba(15,18,24,.6);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.06)}

/* Nav */
header{position:fixed;top:0;left:0;right:0;z-index:50;padding:20px 16px;transition:.4s}
header.scrolled{padding:12px 16px}
.nav-wrap{max-width:1200px;margin:0 auto}
nav{display:flex;align-items:center;justify-content:space-between;border-radius:999px;padding:12px 20px;transition:.4s}
nav.solid{background:rgba(15,18,24,.7);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.06);box-shadow:0 8px 40px rgba(0,0,0,.5)}
.logo{display:flex;align-items:center;gap:10px;font-family:var(--heading);font-weight:700;letter-spacing:.05em;font-size:18px}
.logo-badge{position:relative;display:flex;height:36px;width:36px;align-items:center;justify-content:center;border-radius:12px;background:linear-gradient(135deg,rgba(0,255,163,.2),rgba(0,224,255,.1));border:1px solid rgba(0,255,163,.3)}
.logo-dot{height:8px;width:8px;border-radius:50%;background:var(--green);animation:pulse 2s ease-in-out infinite}
.nav-links{display:none;gap:4px}
.nav-links a{padding:8px 16px;font-size:14px;font-weight:500;color:rgba(226,232,240,.7);border-radius:999px;transition:.2s}
.nav-links a:hover{color:var(--green)}
.nav-actions{display:flex;align-items:center;gap:8px}
.btn-lang{display:none;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;font-size:14px;font-weight:500;color:rgba(226,232,240,.8);border:1px solid rgba(255,255,255,.1);background:transparent;cursor:pointer;transition:.2s}
.btn-lang:hover{color:var(--cyan);border-color:rgba(0,224,255,.4)}
.btn-enter{display:none;align-items:center;gap:6px;padding:8px 16px;border-radius:999px;font-size:14px;font-weight:600;background:var(--green);color:var(--bg);transition:.3s}
.btn-enter:hover{box-shadow:0 0 24px rgba(0,255,163,.5);transform:scale(1.05)}
.btn-menu{display:flex;height:40px;width:40px;align-items:center;justify-content:center;border-radius:999px;color:var(--silver);border:1px solid rgba(255,255,255,.1);background:transparent;cursor:pointer}
@media(min-width:768px){.nav-links{display:flex}.btn-lang{display:flex}.btn-enter{display:inline-flex}.btn-menu{display:none}}

/* Mobile sheet */
.sheet-overlay{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.3s}
.sheet-overlay.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:61;background:var(--surface);border-top:1px solid rgba(255,255,255,.1);padding:24px 24px 40px;border-radius:24px 24px 0 0;transform:translateY(100%);transition:transform .4s}
.sheet.open{transform:translateY(0)}
.sheet-handle{margin:0 auto 24px;height:6px;width:48px;border-radius:999px;background:rgba(255,255,255,.2)}
.sheet a{display:block;padding:14px 16px;border-radius:16px;color:var(--silver);font-size:18px;font-weight:500}
.sheet a:hover{background:rgba(255,255,255,.05)}
.sheet-btns{display:flex;gap:12px;margin-top:16px}
.sheet-btns button,.sheet-btns a{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:16px;font-weight:600;cursor:pointer}
.sheet-lang{color:var(--cyan);border:1px solid rgba(0,224,255,.3);background:transparent}
.sheet-enter{background:var(--green);color:var(--bg)}

/* Hero */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden}
.hero-bg{position:absolute;inset:0}
.hero-bg img{height:100%;width:100%;object-fit:cover;opacity:.6}
.hero-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,7,10,.7),rgba(5,7,10,.8),var(--bg))}
.hero-bg::before{content:"";position:absolute;inset:0;background:linear-gradient(to right,var(--bg),transparent,rgba(5,7,10,.4));z-index:1}
.grid-lines{position:absolute;inset:0;background-image:linear-gradient(to right,rgba(0,255,163,.04) 1px,transparent 1px),linear-gradient(to bottom,rgba(0,224,255,.04) 1px,transparent 1px);background-size:64px 64px;opacity:.3}
.cursor-glow{position:fixed;pointer-events:none;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,255,163,.06),transparent 60%);transform:translate(-50%,-50%);z-index:1;opacity:0;transition:opacity .3s}
@media(hover:hover) and (pointer:fine){.cursor-glow{opacity:1}}
.hero-content{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:140px 16px 80px;width:100%}
.hero-inner{max-width:760px}
.tag{display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:999px;background:rgba(0,255,163,.1);border:1px solid rgba(0,255,163,.3);margin-bottom:32px}
.tag-dot{position:relative;display:flex;height:8px;width:8px}
.tag-dot span{position:absolute;inset:0;border-radius:50%;background:var(--green)}
.tag-dot span:first-child{opacity:.75;animation:ping 1.5s cubic-bezier(0,0,.2,1) infinite}
.tag-text{font-size:12px;font-weight:500;color:var(--green);text-transform:uppercase;letter-spacing:.05em}
h1{font-family:var(--heading);font-weight:700;letter-spacing:-.02em;font-size:clamp(48px,9vw,96px);line-height:.95}
.hero-sub{margin-top:12px;font-family:var(--heading);font-size:clamp(20px,3vw,32px);letter-spacing:.2em;color:var(--green);text-transform:uppercase}
.hero-desc{margin-top:24px;font-size:clamp(16px,2vw,18px);color:rgba(226,232,240,.7);max-width:640px}
.hero-btns{margin-top:40px;display:flex;flex-direction:column;gap:16px}
@media(min-width:640px){.hero-btns{flex-direction:row}}
.btn-primary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 32px;border-radius:999px;background:var(--green);color:var(--bg);font-weight:700;font-size:16px;transition:.3s}
.btn-primary:hover{box-shadow:0 0 40px rgba(0,255,163,.6);transform:scale(1.03)}
.btn-secondary{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:16px 32px;border-radius:999px;border:1px solid rgba(255,255,255,.15);color:var(--silver);font-weight:600;font-size:16px;transition:.2s}
.btn-secondary:hover{border-color:rgba(0,224,255,.5);color:var(--cyan)}
.hero-stats{margin-top:64px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:640px}
.stat-val{font-family:var(--heading);font-weight:700;color:var(--green);font-size:clamp(24px,4vw,40px)}
.stat-lbl{margin-top:4px;font-size:13px;color:rgba(226,232,240,.5);line-height:1.3}
.scroll-down{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);color:rgba(226,232,240,.4);transition:.2s;animation:bounce 2s infinite}
.scroll-down:hover{color:var(--green)}

/* Sections */
section{position:relative}
.sec{padding:96px 16px}
@media(min-width:768px){.sec{padding:128px 24px}}
.sec-wrap{max-width:1200px;margin:0 auto}
.sec-num{font-family:var(--heading);font-size:12px;letter-spacing:.3em;color:var(--cyan);text-transform:uppercase;margin-bottom:16px}
.sec-title{font-family:var(--heading);font-weight:700;font-size:clamp(30px,5vw,52px);line-height:1.1;color:var(--silver)}
.sec-sub{margin-top:16px;color:rgba(226,232,240,.6);font-size:18px}
.sec-head{max-width:640px;margin-bottom:64px}

/* Features */
.feat-grid{display:grid;gap:20px}
@media(min-width:640px){.feat-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.feat-grid{grid-template-columns:repeat(3,1fr)}}
.feat-card{position:relative;padding:28px;border-radius:24px;border:1px solid rgba(255,255,255,.05);background:rgba(15,18,24,.6);transition:.3s;overflow:hidden}
.feat-card:hover{border-color:rgba(0,255,163,.3);transform:translateY(-4px)}
.feat-ic{display:inline-flex;height:48px;width:48px;align-items:center;justify-content:center;border-radius:16px;background:linear-gradient(135deg,rgba(0,255,163,.15),rgba(0,224,255,.05));border:1px solid rgba(0,255,163,.2);color:var(--green);margin-bottom:20px;transition:.3s}
.feat-card:hover .feat-ic{transform:scale(1.1)}
.feat-card h3{font-family:var(--heading);font-size:20px;font-weight:600;margin-bottom:8px}
.feat-card p{color:rgba(226,232,240,.6);font-size:15px;line-height:1.6}

/* Results */
.res-sec{overflow:hidden}
.res-bg{position:absolute;inset:0;z-index:-1}
.res-bg img{height:100%;width:100%;object-fit:cover;opacity:.15}
.res-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,var(--bg),rgba(5,7,10,.9),var(--bg))}
.kpi-grid{display:grid;gap:16px;margin-bottom:56px}
@media(min-width:640px){.kpi-grid{grid-template-columns:repeat(3,1fr)}}
.kpi{padding:28px;border-radius:24px;border:1px solid rgba(255,255,255,.05);background:rgba(15,18,24,.6)}
.kpi.hl{border-color:rgba(0,255,163,.3);background:rgba(0,255,163,.05)}
.kpi-lbl{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:12px;color:rgba(226,232,240,.5);text-transform:uppercase;letter-spacing:.05em}
.kpi-val{font-family:var(--heading);font-weight:700;font-size:clamp(36px,5vw,52px)}
.kpi.hl .kpi-val{color:var(--green)}
.res-cards{display:grid;gap:16px}
@media(min-width:640px){.res-cards{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.res-cards{grid-template-columns:repeat(4,1fr)}}
.res-card{position:relative;padding:24px;border-radius:24px;border:1px solid rgba(255,255,255,.05);background:rgba(15,18,24,.7);backdrop-filter:blur(8px);transition:.3s}
.res-card:hover{border-color:rgba(0,255,163,.4)}
.res-top{display:flex;justify-content:space-between;margin-bottom:16px}
.res-pair{font-family:var(--heading);font-size:12px;letter-spacing:.05em;color:rgba(226,232,240,.5);text-transform:uppercase}
.res-val{font-family:var(--heading);font-size:30px;font-weight:700;color:var(--green);margin-bottom:12px}
.res-card p{font-size:14px;color:rgba(226,232,240,.55);line-height:1.6}
.res-more{margin-top:48px;text-align:center}
.btn-outline{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:999px;border:1px solid rgba(0,224,255,.3);color:var(--cyan);font-weight:500;transition:.2s}
.btn-outline:hover{background:rgba(0,224,255,.1)}

/* VIP */
.vip-sec{overflow:hidden}
.vip-radial{position:absolute;inset:0;z-index:-1;background:radial-gradient(ellipse at center,rgba(30,27,75,.4),transparent 70%)}
.vip-grid{display:grid;gap:48px;align-items:center}
@media(min-width:1024px){.vip-grid{grid-template-columns:1fr 1fr}}
.vip-bens{display:flex;flex-direction:column;gap:16px}
.vip-ben{display:flex;gap:16px;align-items:flex-start}
.vip-ben-ic{flex-shrink:0;display:inline-flex;height:44px;width:44px;align-items:center;justify-content:center;border-radius:12px;background:rgba(0,255,163,.1);border:1px solid rgba(0,255,163,.2);color:var(--green);transition:.3s}
.vip-ben:hover .vip-ben-ic{transform:scale(1.1)}
.vip-ben h3{font-family:var(--heading);font-weight:600;font-size:18px;margin-bottom:4px}
.vip-ben p{color:rgba(226,232,240,.55);font-size:15px}
.vip-card{position:relative;border-radius:32px;overflow:hidden;border:1px solid rgba(0,255,163,.2);padding:40px}
.vip-card-bg{position:absolute;inset:0;z-index:-1}
.vip-card-bg img{height:100%;width:100%;object-fit:cover;opacity:.3}
.vip-card-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(15,18,24,.8),rgba(5,7,10,.9))}

/* How to join */
.how-grid{display:grid;gap:24px;margin-bottom:48px}
@media(min-width:768px){.how-grid{grid-template-columns:repeat(3,1fr)}}
.how-card{position:relative;padding:32px;border-radius:24px;border:1px solid rgba(255,255,255,.05);background:rgba(15,18,24,.6);text-align:center;transition:.3s}
.how-card:hover{border-color:rgba(0,224,255,.3);transform:translateY(-4px)}
.how-num{position:absolute;top:24px;font-family:var(--heading);font-size:48px;font-weight:700;color:rgba(255,255,255,.05)}
[dir=rtl] .how-num{right:24px}
[dir=ltr] .how-num{left:24px}
.how-ic{position:relative;display:inline-flex;height:56px;width:56px;align-items:center;justify-content:center;border-radius:16px;background:linear-gradient(135deg,rgba(0,255,163,.15),rgba(0,224,255,.05));border:1px solid rgba(0,255,163,.2);color:var(--green);margin-bottom:20px}
.how-card h3{font-family:var(--heading);font-size:20px;font-weight:600;margin-bottom:8px}
.how-card p{color:rgba(226,232,240,.55);font-size:15px}
.how-cta{text-align:center}
.btn-cta{display:inline-flex;align-items:center;gap:8px;padding:20px 40px;border-radius:999px;background:var(--green);color:var(--bg);font-weight:700;font-size:18px;transition:.3s}
.btn-cta:hover{box-shadow:0 0 50px rgba(0,255,163,.6);transform:scale(1.03)}
.how-tip{margin-top:20px;display:inline-flex;align-items:center;gap:8px;font-size:14px;color:rgba(226,232,240,.4)}

/* Footer */
footer{border-top:1px solid rgba(255,255,255,.05);padding:64px 16px 40px}
.foot-wrap{max-width:1200px;margin:0 auto}
.foot-grid{display:grid;gap:40px;margin-bottom:48px}
@media(min-width:768px){.foot-grid{grid-template-columns:repeat(3,1fr)}}
.foot-logo{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.foot-logo img{height:44px;width:44px;border-radius:12px}
.foot-logo span{font-family:var(--heading);font-weight:700;letter-spacing:.05em;font-size:20px}
.foot-tag{color:rgba(226,232,240,.5);font-size:14px;max-width:320px}
.foot-h{font-family:var(--heading);font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:16px}
.foot-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.foot-list a{color:rgba(226,232,240,.6);font-size:14px;transition:.2s;display:inline-flex;align-items:center;gap:8px}
.foot-list a:hover{color:var(--green)}
.foot-disc{display:flex;gap:8px;padding:16px;border-radius:16px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);margin-bottom:32px}
.foot-disc p{font-size:12px;color:rgba(226,232,240,.4);line-height:1.6}
.foot-bottom{display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:16px;padding-top:24px;border-top:1px solid rgba(255,255,255,.05)}
@media(min-width:640px){.foot-bottom{flex-direction:row}}
.foot-bottom p{font-size:12px;color:rgba(226,232,240,.4)}

/* Back to top */
.back-top{position:fixed;bottom:24px;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;height:56px;width:56px;border-radius:999px;background:var(--green);color:var(--bg);box-shadow:0 0 30px rgba(0,255,163,.5);cursor:pointer;transition:.3s;opacity:0;transform:translateY(32px);pointer-events:none}
[dir=ltr] .back-top{right:24px}
[dir=rtl] .back-top{left:24px}
.back-top.show{opacity:1;transform:translateY(0);pointer-events:auto}
.back-top:hover{transform:scale(1.1)}
.back-top span{font-size:9px;font-weight:700;letter-spacing:.05em;margin-top:2px}

/* Scroll progress */
.scroll-prog{position:fixed;top:0;bottom:0;width:2px;background:rgba(255,255,255,.05);z-index:40}
[dir=ltr] .scroll-prog{right:12px}
[dir=rtl] .scroll-prog{left:12px}
.scroll-fill{position:absolute;top:0;width:100%;background:linear-gradient(to bottom,var(--green),var(--cyan));transition:height .1s}
@media(max-width:1023px){.scroll-prog{display:none}}

/* Animations */
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px rgba(0,255,163,.8)}50%{opacity:.6;box-shadow:0 0 16px rgba(0,255,163,1)}}
@keyframes ping{75%,100%{transform:scale(2);opacity:0}}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
svg{width:20px;height:20px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-sm{width:16px;height:16px}
.icon-lg{width:28px;height:28px}

/* RTL */
[dir=rtl] body{font-family:var(--body)}
[dir=rtl] .hero-inner{max-width:760px}
</style>
</head>
<body>
<div class="cursor-glow" id="glow"></div>
<div class="scroll-prog"><div class="scroll-fill" id="scrollFill" style="height:0%"></div></div>

<!-- NAV -->
<header id="header">
<div class="nav-wrap">
<nav id="nav">
  <a href="#top" class="logo">

      <svg id="menuIcon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>

</nav>
</div>
</header>

<!-- Mobile sheet -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <a href="#features" onclick="closeSheet()" data-i18n="nav.features"></a>
  <a href="#results" onclick="closeSheet()" data-i18n="nav.results"></a>

  <a href="#join" onclick="closeSheet()" data-i18n="nav.join"></a>
  <div class="sheet-btns">
    <button class="sheet-lang" onclick="toggleLang()">
      <svg class="icon-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      <span id="langLabel2">العربية</span>
    </button>

}

function toggleLang(){ lang = lang==="en"?"ar":"en"; localStorage.setItem("mexc_lang",lang); applyLang(); }

function openSheet(){ document.getElementById("sheet").classList.add("open"); document.getElementById("sheetOverlay").classList.add("open"); document.getElementById("menuIcon").innerHTML='<path d="M18 6 6 18M6 6l12 12"/>'; }
function closeSheet(){ document.getElementById("sheet").classList.remove("open"); document.getElementById("sheetOverlay").classList.remove("open"); document.getElementById("menuIcon").innerHTML='<path d="M4 6h16M4 12h16M4 18h16"/>'; }

function scrollToTop(){ const s=window.scrollY; const st=performance.now(); const d=600; (function tick(n){const p=Math.min((n-st)/d,1);const e=1-Math.pow(1-p,3);window.scrollTo(0,s*(1-e));if(p<1)requestAnimationFrame(tick)})(performance.now()); }

function countUp(el){
  const end=parseFloat(el.dataset.count); const suf=el.dataset.suffix||""; const d=1700;
  let started=false;
  const obs=new IntersectionObserver((entries)=>{if(entries[0].isIntersecting&&!started){started=true;const s=performance.now();(function t(n){const p=Math.min((n-s)/d,1);const e=1-Math.pow(1-p,3);const v=end*e;el.textContent=(Number.isInteger(end)?Math.round(v):v.toFixed(1))+suf;if(p<1)requestAnimationFrame(t)})(performance.now())}},{threshold:.3});
  obs.observe(el);
}

window.addEventListener("scroll",()=>{
  const y=window.scrollY;
  document.getElementById("header").classList.toggle("scrolled",y>24);
  document.getElementById("nav").classList.toggle("solid",y>24);
  const total=document.documentElement.scrollHeight-window.innerHeight;
  document.getElementById("backTop").classList.toggle("show",y>total*.3);
  const pct=total>0?(y/total)*100:0;
  document.getElementById("scrollFill").style.height=pct+"%";
},{passive:true});

window.addEventListener("mousemove",(e)=>{
  if(window.matchMedia("(hover: none)").matches)return;
  const g=document.getElementById("glow"); g.style.left=e.clientX+"px"; g.style.top=e.clientY+"px";
});

document.getElementById("year").textContent=new Date().getFullYear();
applyLang();
document.querySelectorAll("[data-count]").forEach(countUp);
</script>
</body>
